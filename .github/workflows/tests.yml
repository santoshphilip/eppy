name: Tests

on:
  push:
    branches: 
#         [main, master, develop]
  pull_request:
    branches: 
#         [main, master, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", ]   # ← adjust to what you support

    steps:
      - name: Checkout
        uses: actions/checkout@v4   # v4+ is faster & more reliable in 2025

      - name: Install uv
        uses: astral-sh/setup-uv@v3   # use latest stable version (v3 is current in late 2025 / early 2026)

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install 3.9

      - name: Install dependencies
        run: uv sync --frozen --all-extras --dev
        # ────────────────────────────────────────────────
        # --frozen   = respect uv.lock exactly (CI safety)
        # --all-extras = install optional-dependencies e.g. [test], [dev], [all]
        # --dev      = install uv tool dev-dependencies (PEP 735 style)

      - name: Install EnergyPlus
        run: |
          wget -q https://github.com/NatLabRockies/EnergyPlus/releases/download/v8.9.0/EnergyPlus-8.9.0-40101eaafd-Linux-x86_64.sh -O /tmp/eplus_install.sh
          chmod +x /tmp/eplus_install.sh
          echo "y" | sudo /tmp/eplus_install.sh

      - name: Run tests
        env:
          EPPY_INTEGRATION: "TRUE"
        run: uv run pytest
